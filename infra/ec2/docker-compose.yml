# Cheapest deployment: API + Postgres + Caddy (auto-TLS) on one EC2 box.
# Run from this directory:  docker compose --env-file .env up -d --build
# Migrations:               docker compose run --rm api node dist/db/migrate.js
# Seeds:                    docker compose run --rm api node dist/db/seed.js
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: agentic_dashboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic -d agentic_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Not exposed to the host or internet — only the api container reaches it.

  api:
    build:
      context: ../../apps/api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://agentic:${POSTGRES_PASSWORD}@postgres:5432/agentic_dashboard
      PORT: "4000"
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/api/ai/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
    # Not exposed directly — Caddy fronts it with TLS.

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"   # must be free on the box (see README if nginx/apache owns them)
      - "443:443"
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME:?set in .env}
      ACME_EMAIL: ${ACME_EMAIL:?set in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./spa:/srv/spa:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
