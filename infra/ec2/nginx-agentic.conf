# Dashboard vhost for the EXISTING host nginx (Mode A).
# Install:
#   sudo cp nginx-agentic.conf /etc/nginx/sites-available/agentic.zvzsolutions.com
#   sudo ln -s /etc/nginx/sites-available/agentic.zvzsolutions.com /etc/nginx/sites-enabled/
#   sudo mkdir -p /var/www/agentic && sudo rsync -a --delete spa/ /var/www/agentic/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d agentic.zvzsolutions.com     # adds TLS + the 443 block
server {
    listen 80;
    listen [::]:80;
    server_name agentic.zvzsolutions.com;

    # SPA static files (deployed by build-spa.sh + rsync, see above)
    root /var/www/agentic;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        client_max_body_size 20m;   # document uploads (API caps at 15m)
        proxy_read_timeout 180s;    # AI runs are synchronous; real models take time
    }

    # SPA routing: unknown paths fall back to index.html
    location / {
        try_files $uri /index.html;
    }
}
