name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API — typecheck + tests (incl. Postgres integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentic
          POSTGRES_PASSWORD: agentic_ci
          POSTGRES_DB: agentic_dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentic -d agentic_dashboard"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # Unit tests run on the in-memory store + mock provider; integration
      # tests run migrations/triggers/transactions against the service
      # container. Synthetic data only, no API keys.
      - run: npm test
        env:
          TEST_DATABASE_URL: postgres://agentic:agentic_ci@localhost:5432/agentic_dashboard
      - run: npm run build

  web:
    name: Web — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
