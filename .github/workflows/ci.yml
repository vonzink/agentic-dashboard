name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # Tests use the in-memory store + mock provider: no DB, no API keys,
      # synthetic data only.
      - run: npm test

  web:
    name: Web — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
